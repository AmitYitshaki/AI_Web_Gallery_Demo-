<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ImageForge AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script type="module" src="{{ url_for('static', filename='js/gallery.js') }}"></script>
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="/dashboard">ImageForge AI</a>
      <nav class="nav-actions" aria-label="Primary navigation">
        <a class="btn btn-secondary" href="/studio">Open Studio</a>
        <button class="btn btn-ghost" type="button" data-logout>Logout</button>
      </nav>
    </header>

    <main class="page-shell">
      <section class="page-heading">
        <p class="eyebrow">Gallery</p>
        <h1>Your Original Images</h1>
      </section>

      <p id="emptyState" class="empty-state" hidden>
        No original images yet. Open the studio to upload your first image.
      </p>

      <section id="galleryGrid" class="gallery-grid" aria-live="polite"></section>
    </main>

    <div id="variationModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal__panel">
        <div class="modal__header">
          <h2 id="modalTitle">Processed Variations</h2>
          <button id="closeModal" class="icon-button" type="button" aria-label="Close modal">X</button>
        </div>
        <div class="modal__body">
          <img id="modalOriginal" class="modal__original" alt="Selected original image">
          <div id="variationGrid" class="variation-grid"></div>
        </div>
      </div>
    </div>

    <div id="deleteModal" class="modal confirm-modal" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
      <div class="confirm-modal__panel">
        <div class="modal__header">
          <h2 id="deleteModalTitle">Delete Image?</h2>
          <button id="closeDeleteModal" class="icon-button" type="button" aria-label="Close delete confirmation">X</button>
        </div>
        <div class="confirm-modal__body">
          <p>
            This will remove the original image and all saved variations from your gallery.
          </p>
          <div class="confirm-modal__actions">
            <button id="cancelDeleteButton" class="btn btn-secondary" type="button">Cancel</button>
            <button id="confirmDeleteButton" class="btn btn-danger" type="button">Delete</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
